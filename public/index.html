<html>
  <body>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-areas: "bar" "content";
        grid-template-rows: fit-content(100%) 1fr;
        background-color: rgba(0, 0, 0, 0.1);

        font-family: "Noto Sans", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
        font-variation-settings: "wdth" 100;
        font-size: 0.9rem;
      }
      #page {
        grid-area: content;
      }
      #bar {
        background-color: black;
        color: white;
        padding: 0.5rem 0.75rem;
        margin: 5px 5px 0px 5px;
        border-radius: 10px;
        display: grid;
        grid-template-columns: fit-content(100%) 1fr fit-content(100%);
        grid-gap: 10px;

        #bar-bubble {
          border-radius: 100%;
          width: 15px;
          height: 15px;
          align-self: center;
          background-color: yellow;
          &.connected {
            background-color: green;
          }
          &.disconnected {
            background-color: red;
          }
        }
        #bar-info {
          font-size: 0.8rem;
          opacity: 0.5;
          align-self: center;
        }
      }
      #statusModal {
        background-color: rgba(0, 0, 0, 0.1);
        padding: 6px;
        width: 400px;
        grid-gap: 10px;
        align-self: center;
        justify-self: center;
        border-radius: 10px;
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(0, 0, 0, 0.3);
        display: grid;
        text-align: center;
        grid-template-rows: fit-content(100%) 1fr fit-content(100%);
        grid-area: content;
        z-index: 1;
        display: none;
      }
      #statusModal h1 {
        margin: 0;
        padding: 5px;
        border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
      }
      #statusModal p {
        padding: 0px;
        margin: 0px;
      }
      #statusModal button {
        padding: 10px;
      }
      #statusModal small {
        opacity: 0.7;
      }
    </style>

    <div id="bar">
      <div id="bar-bubble"></div>
      <div id="bar-status">Please connect a Circuit.zip device.</div>
      <div id="bar-info">
        <span id="bar-bytes-transferred">0b</span> transferred
      </div>
    </div>
    <div id="statusModal">
      <h1>CIRCUIT.ZIP</h1>
      <p>
        Hello, welcome to Circuit.zip! This page is a portal to web apps hosted
        on your Circuit.zip device.<br /><br />
        Connect your device via USB then pair to browse your apps.
      </p>
      <button id="connectBtn" onclick="pair()">Pair Device</button>
      <small
        >Don't have a Circuit.zip device?
        <a href="https://github.com">Go make one!</a></small
      >
    </div>
    <div id="page"></div>

    <script src="serial.js"></script>
  </body>
</html>
